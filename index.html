<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>دموی Shardo Date Picker</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="./src/ShardoDatePicker.css">
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--bs-body-color);
        background: var(--bs-secondary-bg);
        font-family: Tahoma, Arial, sans-serif;
      }

      main {
        width: min(1120px, calc(100vw - 32px));
        margin: 40px auto;
      }

      .hero {
        display: grid;
        gap: 8px;
        margin-bottom: 24px;
      }

      h1 {
        margin: 0;
        font-size: clamp(24px, 4vw, 36px);
        line-height: 1.45;
      }

      p {
        margin: 0;
        max-width: 760px;
        color: var(--bs-secondary-color);
        line-height: 1.9;
      }

      .demo-grid {
        display: grid;
        grid-template-columns: minmax(300px, 460px) minmax(280px, 1fr);
        gap: 24px;
        align-items: start;
      }

      .demo-panel {
        display: grid;
        gap: 18px;
        padding: 24px;
        border: 1px solid var(--bs-border-color);
        border-radius: 8px;
        background: var(--bs-body-bg);
        box-shadow: 0 18px 48px rgba(17, 24, 39, 0.08);
      }

      .demo-actions {
        display: flex;
        justify-content: flex-start;
      }

      .demo-toggle {
        min-height: 38px;
        border: 1px solid var(--bs-border-color);
        border-radius: 8px;
        padding: 0 14px;
        color: var(--bs-body-color);
        background: var(--bs-body-bg);
        font-family: Tahoma, Arial, sans-serif;
        font-weight: 700;
        cursor: pointer;
      }

      .field {
        display: grid;
        gap: 8px;
      }

      label {
        font-size: 13px;
        font-weight: 700;
      }

      output,
      pre {
        display: block;
        min-height: 42px;
        margin: 0;
        padding: 12px;
        border: 1px solid var(--bs-border-color);
        border-radius: 8px;
        background: var(--bs-tertiary-bg);
        color: var(--bs-body-color);
        direction: ltr;
        font-family: Consolas, Tahoma, monospace;
        font-size: 13px;
        line-height: 1.8;
        overflow: auto;
        white-space: pre-wrap;
      }

      .inline-host {
        display: grid;
        justify-items: start;
      }

      .section-title {
        margin: 0;
        font-size: 16px;
        line-height: 1.8;
      }

      @media (max-width: 820px) {
        main {
          width: min(100vw - 20px, 560px);
          margin: 18px auto;
        }

        .demo-grid {
          grid-template-columns: 1fr;
          gap: 16px;
        }

        .demo-panel {
          gap: 14px;
          padding: 14px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <h1>Shardo Date Picker</h1>
        <p>تنظیمات کنترل از طریق attributeهای HTML خوانده می‌شود و مقدار میلادی به صورت hidden input برای ارسال به سرور ساخته می‌شود.</p>
        <div class="demo-actions">
          <button class="demo-toggle" id="themeToggle" type="button">تغییر تم</button>
        </div>
      </section>

      <section class="demo-grid">
        <div class="demo-panel">
          <h2 class="section-title">نمونه‌های attribute-based</h2>

          <div class="field">
            <label for="appointment">تاریخ و زمان</label>
            <input id="appointment" name="appointment_display" type="text" placeholder="1405/02/29 14:30" autocomplete="off" data-shardo-datepicker data-shardo-datepicker-format="yyyy/MM/dd HH:mm" data-shardo-datepicker-gregorian-format="yyyy-MM-dd HH:mm" data-shardo-datepicker-hidden-input-name="appointment" data-shardo-datepicker-hidden-input-id="appointment_gregorian" data-shardo-datepicker-show-time="true" data-shardo-datepicker-time-step="5" data-shardo-datepicker-auto-close="false" data-shardo-datepicker-min="1404/01/01" data-shardo-datepicker-max="1410/12/29" data-shardo-datepicker-disabled-dates="1405/01/13" data-shardo-datepicker-show-friday-holidays="true" data-shardo-datepicker-holidays="1405/02/15,1405/03/14" data-shardo-datepicker-show-selected-text="true" data-shardo-datepicker-selected-text-format="dddd d MMMM yyyy">
          </div>

          <div class="field">
            <label for="vacation">رنج تاریخ</label>
            <input id="vacation" name="vacation_display" type="text" placeholder="1405/03/01 - 1405/03/10" autocomplete="off" data-shardo-datepicker data-shardo-datepicker-range="true" data-shardo-datepicker-range-separator=" - " data-shardo-datepicker-gregorian-range-separator=" - " data-shardo-datepicker-format="yyyy/MM/dd" data-shardo-datepicker-gregorian-format="yyyy-MM-dd" data-shardo-datepicker-hidden-input-name="vacation_range" data-shardo-datepicker-show-time="false" data-shardo-datepicker-auto-close="true" data-shardo-datepicker-show-friday-holidays="true" data-shardo-datepicker-holidays="1405/02/20" data-shardo-datepicker-show-selected-text="true" data-shardo-datepicker-selected-text-format="dddd d MMMM">
          </div>

          <div class="field">
            <label for="birthday">فقط تاریخ</label>
            <input id="birthday" name="birthday_display" type="text" placeholder="1400/01/01" autocomplete="off" data-shardo-datepicker data-shardo-datepicker-format="yyyy/MM/dd" data-shardo-datepicker-gregorian-format="yyyy-MM-dd" data-shardo-datepicker-hidden-input-name="birthday" data-shardo-datepicker-show-time="false" data-shardo-datepicker-auto-close="true" data-shardo-datepicker-year-range="120">
          </div>

          <div class="field">
            <label for="allSettings">نمونه همه تنظیمات</label>
            <input id="allSettings" name="all_settings_display" type="text" placeholder="1405/02/01" autocomplete="off" data-shardo-datepicker data-shardo-datepicker-format="yyyy/MM/dd" data-shardo-datepicker-gregorian-format="yyyy-MM-dd" data-shardo-datepicker-hidden-input="true" data-shardo-datepicker-hidden-input-name="all_settings" data-shardo-datepicker-hidden-input-id="all_settings_gregorian" data-shardo-datepicker-show-time="false" data-shardo-datepicker-time-step="10" data-shardo-datepicker-min="1404/01/01" data-shardo-datepicker-max="1412/12/29" data-shardo-datepicker-disabled-dates="1405/02/10,1405/02/11" data-shardo-datepicker-disable-past="false" data-shardo-datepicker-disable-future="false" data-shardo-datepicker-auto-close="true" data-shardo-datepicker-use-persian-digits="false" data-shardo-datepicker-input-readonly="false" data-shardo-datepicker-range="false" data-shardo-datepicker-show-friday-holidays="true" data-shardo-datepicker-holidays="1405/02/15,1405/02/22" data-shardo-datepicker-week-start="6" data-shardo-datepicker-year-range="90" data-shardo-datepicker-theme="auto" data-shardo-datepicker-bootstrap-theme="true" data-shardo-datepicker-show-selected-text="true" data-shardo-datepicker-selected-text-format="dddd d MMMM yyyy">
          </div>

          <div class="field">
            <label>خروجی قابل مشاهده</label>
            <output id="result">هنوز مقداری انتخاب نشده است.</output>
          </div>

          <div class="field">
            <label>وضعیت و مقدار hidden</label>
            <pre id="state"></pre>
          </div>
        </div>

        <div class="demo-panel inline-host">
          <h2 class="section-title">نمونه inline</h2>
          <div id="inlinePicker" data-shardo-datepicker data-shardo-datepicker-inline="true" data-shardo-datepicker-show-time="true" data-shardo-datepicker-time-step="15" data-shardo-datepicker-format="yyyy/MM/dd HH:mm" data-shardo-datepicker-gregorian-format="yyyy-MM-dd HH:mm" data-shardo-datepicker-hidden-input="false" data-shardo-datepicker-bootstrap-theme="true" data-shardo-datepicker-show-selected-text="true" data-shardo-datepicker-selected-text-format="dddd d MMMM yyyy"></div>
        </div>
      </section>
    </main>

    <script type="module">
      import "./src/ShardoDatePicker.js";

      const result = document.querySelector("#result");
      const state = document.querySelector("#state");
      const themeToggle = document.querySelector("#themeToggle");

      const hiddenValue = (name) => document.querySelector(`[name="${name}"]`)?.value || "";

      const renderState = (label, detail, hiddenName) => {
        result.textContent = `${label}: ${detail.value || "خالی"}`;
        state.textContent = JSON.stringify({
          value: detail.value,
          gregorian: detail.gregorianValue,
          selectedText: detail.selectedText,
          hiddenName,
          hiddenValue: hiddenValue(hiddenName),
          date: detail.date,
          jalali: detail.jalali
        }, null, 2);
      };

      [
        ["#appointment", "قرار ملاقات", "appointment"],
        ["#vacation", "رنج مرخصی", "vacation_range"],
        ["#birthday", "تاریخ تولد", "birthday"],
        ["#allSettings", "همه تنظیمات", "all_settings"]
      ].forEach(([selector, label, hiddenName]) => {
        const element = document.querySelector(selector);
        element.addEventListener("shardo-datepicker:change", (event) => renderState(label, event.detail, hiddenName));
      });

      document.querySelector("#inlinePicker").addEventListener("shardo-datepicker:change", (event) => renderState("تقویم inline", event.detail, ""));

      themeToggle.addEventListener("click", () => {
        const next = document.documentElement.dataset.bsTheme === "dark" ? "light" : "dark";
        document.documentElement.dataset.bsTheme = next;
        document.body.dataset.bsTheme = next;
      });
    </script>
  </body>
</html>
