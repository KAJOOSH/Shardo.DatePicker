<!doctype html>
<html lang="fa" dir="rtl" data-bs-theme="light">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Shardo DatePicker user settings test</title>
    <link rel="stylesheet" href="/src/ShardoDatePicker.css">
    <script>
      const ShardoNativeDate = Date;
      const ShardoFixedNow = new ShardoNativeDate(2026, 4, 19, 9, 30, 0, 0);
      class ShardoFixedDate extends ShardoNativeDate {
        constructor(...args) {
          super(...(args.length ? args : [ShardoFixedNow.getTime()]));
        }

        static now() {
          return ShardoFixedNow.getTime();
        }
      }
      ShardoFixedDate.UTC = ShardoNativeDate.UTC;
      ShardoFixedDate.parse = ShardoNativeDate.parse;
      window.Date = ShardoFixedDate;
    </script>
    <style>

      [data-bs-theme="light"] {
        --bs-body-bg: #ffffff;
        --bs-body-color: #212529;
        --bs-secondary-color: #6c757d;
        --bs-tertiary-color: #adb5bd;
        --bs-border-color: #dee2e6;
        --bs-border-color-translucent: rgba(0, 0, 0, 0.175);

        --bs-body-color: #dee2e6;

        --bs-tertiary-bg: #2b3035;

        --bs-primary-text-emphasis: #6ea8fe;
        --bs-primary-bg-subtle: #031633;
        --bs-primary-border-subtle: #084298;
        --bs-danger: #ea868f;
        --bs-danger-bg-subtle: #2c0b0e;

        --bs-white: #ffffff;

        --bs-body-font-family: Tahoma, Arial, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 24px;
        color: var(--bs-body-color);
        background: var(--bs-secondary-bg);
        font-family: var(--bs-body-font-family);
      }

      main {
        display: grid;
        gap: 16px;
        width: min(920px, 100%);
        margin: 0 auto;
      }

      section {
        display: grid;
        gap: 12px;
        padding: 16px;
        border: 1px solid var(--bs-border-color);
        border-radius: 8px;
        background: var(--bs-body-bg);
      }

      .field {
        display: grid;
        gap: 6px;
      }

      .dark-parent {
        color-scheme: dark;
        padding: 12px;
        border-radius: 8px;
        color: #f8fafc;
        background: #111827;
      }

      .bootstrap-dark-parent {
        --bs-body-bg: #212529;
        --bs-body-color: #dee2e6;
        --bs-secondary-color: rgba(222, 226, 230, 0.75);
        --bs-tertiary-color: rgba(222, 226, 230, 0.5);
        --bs-border-color: #495057;
        --bs-border-color-translucent: rgba(255, 255, 255, 0.15);
        --bs-secondary-bg: #343a40;
        --bs-tertiary-bg: #2b3035;
        --bs-primary: #6ea8fe;
        --bs-primary-rgb: 110, 168, 254;
        --bs-primary-text-emphasis: #6ea8fe;
        --bs-primary-bg-subtle: #031633;
        --bs-primary-border-subtle: #084298;
        --bs-danger: #ea868f;
        --bs-danger-bg-subtle: #2c0b0e;
        --bs-danger-border-subtle: #842029;
        --bs-white: #ffffff;
        --bs-box-shadow-lg: 0 1rem 3rem rgba(0, 0, 0, 0.5);
        --bs-border-radius: 0.375rem;
        --bs-body-font-family: Tahoma, Arial, sans-serif;
      }
    </style>
  </head>
  <body>

        </div>

        <div class="field">
          <label for="timePicker">time picker</label>
          <input id="timePicker" name="time_picker_display" value="1405/02/01 08:00" autocomplete="off" data-shardo-datepicker data-shardo-datepicker-format="yyyy/MM/dd HH:mm" data-shardo-datepicker-gregorian-format="yyyy-MM-dd HH:mm" data-shardo-datepicker-hidden-input-name="time_picker" data-shardo-datepicker-show-time="true" data-shardo-datepicker-time-step="5" data-shardo-datepicker-auto-close="false" data-shardo-datepicker-show-selected-text="true" data-shardo-datepicker-selected-text-format="dddd d MMMM yyyy" data-shardo-datepicker-months="Farvardin,Ordibehesht,Khordad,Tir,Mordad,Shahrivar,Mehr,Aban,Azar,Dey,Bahman,Esfand" data-shardo-datepicker-weekday-names="Saturday,Sunday,Monday,Tuesday,Wednesday,Thursday,Friday">
        </div>

        <div class="field">
          <label for="rangePicker">range picker</label>
          <input id="rangePicker" name="range_picker_display" autocomplete="off" data-shardo-datepicker data-shardo-datepicker-range="true" data-shardo-datepicker-format="yyyy/MM/dd" data-shardo-datepicker-gregorian-format="yyyy-MM-dd" data-shardo-datepicker-range-separator="__" data-shardo-datepicker-gregorian-range-separator=".." data-shardo-datepicker-hidden-input-name="range_picker" data-shardo-datepicker-show-time="false" data-shardo-datepicker-auto-close="true" data-shardo-datepicker-show-selected-text="true" data-shardo-datepicker-selected-text-range-separator="__">
        </div>

        <div class="field">
          <label for="manualPicker">manual picker</label>

        </div>

        <div class="field">
          <label for="jsonPicker">json picker</label>
          <input id="jsonPicker" name="json_picker_display" autocomplete="off" data-shardo-datepicker='{"format":"yyyy/MM/dd","gregorianFormat":"yyyy-MM-dd","showTime":false,"autoClose":true,"hiddenInputName":"json_picker","showSelectedText":true}'>
        </div>

        <div class="field">
          <label for="readonlyPicker">readonly picker</label>
          <input id="readonlyPicker" name="readonly_picker_display" autocomplete="off" data-shardo-datepicker data-shardo-datepicker-input-readonly="true" data-shardo-datepicker-show-time="false">
        </div>

        <div class="field">
          <label for="hiddenOffPicker">hidden off picker</label>
          <input id="hiddenOffPicker" name="hidden_off_picker_display" autocomplete="off" data-shardo-datepicker data-shardo-datepicker-hidden-input="false" data-shardo-datepicker-show-time="false">
        </div>

        <div class="field">
          <label for="persianDigitsPicker">persian digits picker</label>
          <input id="persianDigitsPicker" name="persian_digits_picker_display" autocomplete="off" data-shardo-datepicker data-shardo-datepicker-format="yyyy/MM/dd" data-shardo-datepicker-use-persian-digits="true" data-shardo-datepicker-show-time="false" data-shardo-datepicker-auto-close="true">
        </div>

          <input id="disablePastPicker" name="disable_past_picker_display" autocomplete="off" data-shardo-datepicker data-shardo-datepicker-disable-past="true" data-shardo-datepicker-show-time="false" data-shardo-datepicker-auto-close="true">
        </div>

        <div class="field">
          <label for="disableFuturePicker">disable future picker</label>
          <input id="disableFuturePicker" name="disable_future_picker_display" autocomplete="off" data-shardo-datepicker data-shardo-datepicker-disable-future="true" data-shardo-datepicker-show-time="false" data-shardo-datepicker-auto-close="true">
        </div>

        <div class="field">
          <label for="darkOptionPicker">dark option picker</label>
          <input id="darkOptionPicker" name="dark_option_picker_display" autocomplete="off" data-shardo-datepicker data-shardo-datepicker-theme="dark" data-shardo-datepicker-show-time="false" data-shardo-datepicker-auto-close="true">
        </div>

        <div class="field dark dark-parent">
          <label for="darkParentPicker">dark parent picker</label>
          <input id="darkParentPicker" name="dark_parent_picker_display" autocomplete="off" data-shardo-datepicker data-shardo-datepicker-theme="auto" data-shardo-datepicker-show-time="false" data-shardo-datepicker-auto-close="true">
        </div>

        <div class="field dark dark-parent bootstrap-dark-parent">
          <label for="bootstrapDarkParentPicker">bootstrap dark parent picker</label>
          <input id="bootstrapDarkParentPicker" name="bootstrap_dark_parent_picker_display" autocomplete="off" data-shardo-datepicker data-shardo-datepicker-theme="auto" data-shardo-datepicker-bootstrap-theme="true" data-shardo-datepicker-show-time="false" data-shardo-datepicker-auto-close="true">

        <div class="field">
          <label for="jsOnly">js only picker</label>

        </div>

      <section>
        <div id="inlinePicker" data-testid="inlinePicker" data-shardo-datepicker data-shardo-datepicker-inline="true" data-shardo-datepicker-show-time="true" data-shardo-datepicker-time-step="15" data-shardo-datepicker-format="yyyy/MM/dd HH:mm" data-shardo-datepicker-gregorian-format="yyyy-MM-dd HH:mm" data-shardo-datepicker-hidden-input="false" data-shardo-datepicker-bootstrap-theme="true" data-shardo-datepicker-show-selected-text="true"></div>
      </section>

      <section id="portal"></section>
    </main>

    <script type="module">
      import { ShardoDatePicker } from "/src/ShardoDatePicker.js";

      window.recordedEvents = [];
      window.callbackEvents = [];

      const compactDetail = (detail) => ({
        value: detail.value,
        gregorianValue: detail.gregorianValue,
        selectedText: detail.selectedText,
        isRange: detail.isRange,
        jalali: detail.jalali
      });

      ["select", "change", "clear", "open", "close"].forEach((name) => {
        document.addEventListener(`shardo-datepicker:${name}`, (event) => {
          window.recordedEvents.push({
            type: event.type,
            target: event.target.id || event.target.getAttribute("data-testid") || "",
            detail: compactDetail(event.detail)
          });
        });
      });

      window.jsPicker = new ShardoDatePicker("#jsOnly", {
        format: "yyyy/MM/dd",
        gregorianFormat: "yyyy-MM-dd",
        value: { jy: 1405, jm: 2, jd: 12 },
        showTime: false,
        autoClose: true,
        hiddenInputName: "js_only",
        appendTo: document.querySelector("#portal"),
        showSelectedText: true,
        onOpen: () => window.callbackEvents.push("open"),
        onClose: () => window.callbackEvents.push("close"),
        onSelect: (value) => window.callbackEvents.push(`select:${value}`),
        onChange: (value, date, jalali, gregorian) => window.callbackEvents.push(`change:${value}:${gregorian}`)
      });

      window.ready = true;
    </script>
  </body>
</html>
